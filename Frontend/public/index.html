<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nano Exchange - Fast File Transfer</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- React Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-icons@5.0.1/fontawesome/index.css">
  
  <!-- Custom Styles (No @tailwind needed!) -->
  <style>
    /* Glass Morphism */
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .glass:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-4px);
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.25);
    }
    
    /* Primary Button */
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
      color: white;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(79, 70, 229, 0.4);
      border: none;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.6);
    }
    
    .btn-primary:active {
      transform: translateY(-1px);
    }
    
    /* Input Fields */
    .input-field {
      background: rgba(255, 255, 255, 0.15) !important;
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.3) !important;
      border-radius: 20px !important;
      color: white !important;
      padding: 18px 24px !important;
      font-size: 16px !important;
      width: 100%;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.7) !important;
    }
    
    .input-field:focus {
      outline: none !important;
      border-color: #4f46e5 !important;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2) !important;
      background: rgba(255, 255, 255, 0.25) !important;
      transform: translateY(-1px);
    }
    
    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    
    .float {
      animation: float 6s ease-in-out infinite;
    }
    
    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Navbar */
    .navbar-glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    /* File Dropzone */
    .dropzone {
      border: 3px dashed rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
    }
    
    .dropzone.dragover {
      border-color: #4f46e5;
      background: rgba(79, 70, 229, 0.15);
      transform: scale(1.02);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .text-6xl { font-size: 2.5rem !important; }
      .text-5xl { font-size: 2rem !important; }
      .text-4xl { font-size: 1.75rem !important; }
      .text-3xl { font-size: 1.5rem !important; }
      .text-2xl { font-size: 1.25rem !important; }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #3730a3, #6d28d9);
    }
  </style>
</head>
<body style="margin: 0; padding: 0; overscroll-behavior: none;">
  <div id="root"></div>
  <script type="module" crossorigin src="/assets/index-XXXXXXXX.js"></script>
</body>
</html>
