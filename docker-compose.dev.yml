# docker-compose.dev.yml — Local development stack
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml down
#
# What this gives you:
#   - FastAPI with hot-reload (source mounted as volume)
#   - Local MySQL 8 (so you don't need Aiven credentials locally)
#   - Uploads directory persisted via named volume
#   - Health checks on both services

version: "3.9"

services:
  # ── FastAPI backend (dev mode — hot reload) ──────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev              # Use the dev stage (uvicorn + reload)
    container_name: nano_api_dev
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload — changes reflected without rebuild
      - ./server:/app
      # Exclude the host venv so the container uses its own (critical!)
      - /app/venv
      # Persist uploads between container restarts
      - nano_uploads_dev:/app/uploads
    env_file:
      - ./server/.env.docker.dev
    environment:
      # Override the DB URL to point at the local mysql container
      DB_URL: "mysql+pymysql://nano:nano123@mysql:3306/nano_exchange"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── MySQL 8 (local dev database — mirrors Aiven MySQL) ───────────────────
  mysql:
    image: mysql:8.0
    container_name: nano_mysql_dev
    ports:
      - "3307:3306"            # Exposed on 3307 to avoid conflict with local MySQL
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nano_exchange
      MYSQL_USER: nano
      MYSQL_PASSWORD: nano123
    volumes:
      - nano_mysql_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nano", "-pnano123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  nano_mysql_dev:
    name: nano_mysql_dev
  nano_uploads_dev:
    name: nano_uploads_dev
