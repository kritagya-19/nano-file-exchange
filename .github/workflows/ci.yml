name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend: Python / FastAPI
  # ──────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    env:
      # Use SQLite in CI — no production DB credentials needed
      DB_URL: "sqlite:///./test.db"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      FRONTEND_URL: "http://localhost:5173"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app/ tests/ --config=.flake8

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Frontend: React / Vite
  # ──────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # Use a placeholder URL for the CI build check
          VITE_API_BASE_URL: "https://placeholder-backend.onrender.com"
