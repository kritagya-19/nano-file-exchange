name: Deploy

on:
  push:
    branches:
      - main

# Only run one deploy at a time; cancel any in-progress run
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Deploy Frontend → Vercel
  # ──────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"

  # ──────────────────────────────────────────────────────────────────
  # Deploy Backend → Render (via Deploy Hook)
  # ──────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response code: $response"
          if [ "$response" -ne 200 ] && [ "$response" -ne 201 ]; then
            echo "❌ Render deploy hook failed with HTTP $response"
            exit 1
          fi
          echo "✅ Render deploy triggered successfully"
